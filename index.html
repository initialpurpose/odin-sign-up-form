<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Odin - Sign up</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
  <div class="logo-column">
    <div class="logo-container">
      <img alt="The Odin Project Icon" height=100px src="img/odin-lined.png" width=auto>
      Odin
    </div>
  </div>

  <main>
    <div class="top">
      <h1>This is not a real online service! You know you need something
        like this in your life to help you realise your deepest dreams.
        Sign up <em>now</em> to get started.</h1>

      <h1>You <em>know</em> you want to!</h1>
    </div>

    <div class="content-container">
      <h2>Let's do this!</h2>

      <div class="sign-up-form">
        <form action="" method="post">
          <div class="form-row">
            <div class="form-field">
              <label for="first-name">First Name</label>
              <input id="first-name" name="first-name" type="text">
            </div>

            <div class="form-field">
              <label for="last-name">Last Name</label>
              <input id="last-name" name="last-name" type="text">
            </div>
          </div>

          <div class="form-row">
            <div class="form-field">
              <label for="email">Email</label>
              <input id="email" name="email" type="email">
            </div>

            <div class="form-field">
              <label for="phone">Phone Number</label>
              <input id="phone" name="phone" type="tel">
            </div>
          </div>

          <div class="form-row">
            <div class="form-field">
              <label for="pwd">Password</label>
              <input id="pwd" name="pwd" type="password">
            </div>

            <div class="form-field">
              <label for="check-pwd">Confirm Password</label>
              <input id="check-pwd" name="check-pwd" type="password">
            </div>
          </div>

        </form>
      </div>
    </div>

    <div class="bottom">
      <button class="create-acc-btn">Create Account</button>
      <span class="login-text">Already have an account? <a href="/">Log in</a></span>
    </div>
  </main>
</div>
</body>
</html>
