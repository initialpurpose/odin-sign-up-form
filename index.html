<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Odin - Sign up</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
  <div class="logo-column">
    <div class="logo-container">
      <img alt="The Odin Project Icon" height=100px src="img/odin-lined.png" width=auto>
      Odin
    </div>
  </div>

  <main>
    <div class="top">
      <h1>This is not a real online service! You know you need something
        like this in your life to help you realise your deepest dreams.
        Sign up <em>now</em> to get started.</h1>

      <h1>You <em>know</em> you want to!</h1>
    </div>

    <div class="sign-up-form">
      <h2>Let's do this!</h2>
    </div>

    <div class="bottom">
      <button class="create-acc-btn">Create Account</button>
      <span class="login-text">Already have an account? <a href="/">Log in</a></span>
    </div>
  </main>
</div>
</body>
</html>
